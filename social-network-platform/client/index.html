<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Network v2 - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="text-center">Social Network</h1>
            <p class="text-center text-muted">Connect, Share, and Discover.</p>
            
            <!-- Login -->
            <div id="login-section">
                <h2>Welcome Back</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="login-email" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Log In</button>
                    <div class="error-msg" id="login-error"></div>
                </form>
                <p class="text-center form-footer">
                    New here? <a href="#" id="show-register">Create an account</a>
                </p>
            </div>

            <!-- Register -->
            <div id="register-section" style="display: none;">
                <h2>Create Account</h2>
                <form id="register-form">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="reg-username" required minlength="3" placeholder="JaneDoe">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="reg-email" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="reg-password" required minlength="6" placeholder="Min. 6 characters">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
                    <div class="error-msg" id="register-error"></div>
                </form>
                <p class="text-center form-footer">
                    Already have an account? <a href="#" id="show-login">Log in</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        if (localStorage.getItem('token')) window.location.href = 'feed.html';

        document.getElementById('show-register').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('register-section').style.display = 'block';
        });

        document.getElementById('show-login').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('register-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
        });
    </script>
</body>
</html>

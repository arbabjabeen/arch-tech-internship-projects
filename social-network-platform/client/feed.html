<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed | Social Network</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="feed.html" class="nav-brand">Social.</a>
            
            <div class="nav-search">
                <input type="text" id="search-input" placeholder="Search users...">
                <div id="search-results"></div>
            </div>

            <div class="nav-links">
                <img id="nav-profile-pic" class="nav-profile-pic" src="img/default-avatar.png" onerror="this.src='/uploads/default.png'; this.onerror=null;" alt="User">
                <span id="current-username">User</span>
                <a href="profile.html">Profile</a>
                <a href="#" id="logout-btn" class="text-muted">Logout</a>
            </div>
        </div>
    </nav>

    <div class="main-layout">
        <main>
            <!-- Post Composer -->
            <div class="card">
                <form id="create-post-form">
                    <div class="form-group" style="margin-bottom:0.5rem;">
                        <textarea id="post-content" placeholder="Share something new today..." required></textarea>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border-color); padding-top:1rem; margin-top:0.5rem;">
                        <div style="display:flex; gap:1rem; align-items:center;">
                            <div class="file-upload-wrapper">
                                <button type="button" class="btn btn-outline btn-sm">📷 Add Photo</button>
                                <input type="file" id="post-image" accept="image/*">
                            </div>
                            <span id="file-name" class="text-muted text-sm" style="font-size:0.75rem;"></span>
                            
                            <select id="post-visibility" class="btn btn-outline btn-sm" style="margin-left:0.5rem;">
                                <option value="public">🌍 Public</option>
                                <option value="friends">👥 Friends Only</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Post</button>
                    </div>
                    <div id="post-error" class="error-msg text-left"></div>
                </form>
            </div>

            <div id="posts-container">
                <p class="text-center text-muted">Loading your feed...</p>
            </div>
        </main>

        <aside>
            <div class="sidebar-section">
                <h3>Friend Requests</h3>
                <div id="requests-container">
                    <p class="text-muted text-center">No pending requests</p>
                </div>
            </div>

            <div class="sidebar-section">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--border-color); padding-bottom: 0.75rem; margin-bottom: 1rem;">
                    <h3 style="border:none; margin:0; padding:0;">Notifications</h3>
                    <span id="notif-badge" style="background:var(--danger); color:white; border-radius:999px; padding:2px 6px; font-size:0.75rem; display:none;">0</span>
                </div>
                <div id="notifications-container">
                    <p class="text-muted text-center">You're caught up!</p>
                </div>
                <button id="mark-read-btn" class="btn btn-sm btn-outline btn-block" style="margin-top:1rem; display:none;">Mark All as Read</button>
            </div>
        </aside>
    </div>

    <div id="toast-container"></div>

    <script src="js/auth.js"></script>
    <script src="js/socket.js"></script>
    <script src="js/feed.js"></script>
    
    <script>
        // Update file label
        document.getElementById('post-image').addEventListener('change', function() {
            const fileName = this.files[0] ? this.files[0].name : '';
            document.getElementById('file-name').textContent = fileName;
        });
    </script>
</body>
</html>

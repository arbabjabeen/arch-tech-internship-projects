<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Social Network</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="feed.html" class="nav-brand">Social.</a>
            
            <div class="nav-search">
                <input type="text" id="search-input" placeholder="Search users...">
                <div id="search-results"></div>
            </div>

            <div class="nav-links">
                <img id="nav-profile-pic" class="nav-profile-pic" src="img/default-avatar.png" onerror="this.src='/uploads/default.png'; this.onerror=null;" alt="User">
                <span id="current-username">User</span>
                <a href="feed.html">Feed</a>
                <a href="#" id="logout-btn" class="text-muted">Logout</a>
            </div>
        </div>
    </nav>

    <div class="main-layout">
        <main>
            <!-- Profile Info Card -->
            <div class="card" id="profile-info-card">
                <div class="profile-header">
                    <img id="profile-picture-large" class="profile-pic-large" src="/uploads/default.png" onerror="this.src='/uploads/default.png'; this.onerror=null;" alt="Profile Picture">
                    <div class="profile-meta">
                        <h2 id="profile-username">Loading...</h2>
                        <p id="profile-bio" class="text-muted"></p>
                    </div>
                    <div id="profile-actions">
                        <button id="add-friend-btn" class="btn btn-primary btn-sm" style="display:none;">Add Friend</button>
                        <span id="friend-status" class="text-muted" style="display:none; font-weight:500;">Friends ✓</span>
                        
                        <!-- Edit Profile Controls (Self) -->
                        <button id="edit-profile-btn" class="btn btn-outline btn-sm" style="display:none;">Edit Profile</button>
                    </div>
                </div>

                <!-- Edit Profile Form (Hidden by default) -->
                <div id="edit-profile-form" style="display:none; margin-top:1.5rem; border-top:1px solid var(--border-color); padding-top:1.5rem;">
                    <h3>Update Profile</h3>
                    <form id="update-form" style="margin-top:1rem;">
                        <div class="form-group">
                            <label>Bio</label>
                            <input type="text" id="edit-bio" placeholder="Tell us about yourself">
                        </div>
                        <div class="form-group">
                            <label>Profile Picture</label>
                            <div class="file-upload-wrapper">
                                <button type="button" class="btn btn-outline btn-sm">📷 Select Image</button>
                                <input type="file" id="edit-pic" accept="image/*">
                            </div>
                            <span id="edit-file-name" class="text-muted text-sm" style="font-size:0.75rem;"></span>
                        </div>
                        <div class="form-group" style="display:flex; align-items:center; gap:0.5rem;">
                            <input type="checkbox" id="edit-private" style="width:auto; transform:scale(1.2);">
                            <label style="margin:0; font-weight:normal;">Private Account (Only friends see posts)</label>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm">Save Changes</button>
                        <button type="button" id="cancel-edit-btn" class="btn btn-outline btn-sm">Cancel</button>
                        <div id="edit-error" class="error-msg"></div>
                    </form>
                </div>
            </div>

            <div id="user-posts-container">
                <p class="text-center text-muted">Loading posts...</p>
            </div>
        </main>

        <aside>
            <div class="sidebar-section">
                <h3>Friends <span id="friends-count" class="text-muted" style="font-weight:normal; font-size:0.875rem;">(0)</span></h3>
                <div id="friends-container" style="margin-top:1rem;">
                    <p class="text-muted text-center">Loading friends...</p>
                </div>
            </div>
        </aside>
    </div>

    <div id="toast-container"></div>

    <script src="js/auth.js"></script>
    <script src="js/socket.js"></script>
    <script src="js/profile.js"></script>
    <script>
        document.getElementById('edit-pic').addEventListener('change', function() {
            document.getElementById('edit-file-name').textContent = this.files[0] ? this.files[0].name : '';
        });
    </script>
</body>
</html>

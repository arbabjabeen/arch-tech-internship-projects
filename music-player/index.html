<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A modern, dark-themed web music player with playlist management, search, and playback controls." />
  <title>Pulse — Music Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== SIDEBAR — Playlist ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>
        <span class="sidebar-icon">♫</span> Playlist
      </h2>
      <button class="sidebar-toggle-close" id="sidebar-close-btn" title="Close sidebar">✕</button>
    </div>

    <div class="playlist-container" id="playlist-container">
      <p class="playlist-empty" id="playlist-empty">
        Your playlist is empty.<br><span>Click <strong>+</strong> on any song to add it here.</span>
      </p>
      <ul class="playlist-list" id="playlist-list"></ul>
    </div>

    <div class="playlist-footer" id="playlist-footer">
      <span id="playlist-count">0 songs</span>
      <span id="playlist-duration">0:00</span>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main" id="main">

    <!-- Top bar -->
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebar-toggle-btn" title="Toggle playlist">
        <span class="hamburger">☰</span>
      </button>
      <div class="brand">
        <div class="brand-logo">▶</div>
        <h1 class="brand-name">Pulse</h1>
      </div>
      <div class="search-wrapper" id="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" class="search-input" placeholder="Search songs, artists, albums…" autocomplete="off" />
        <button class="search-clear" id="search-clear" title="Clear search">✕</button>
      </div>
    </header>

    <!-- Now Playing hero -->
    <section class="now-playing" id="now-playing-section">
      <div class="now-playing-inner">
        <div class="album-art-wrapper">
          <div class="album-art" id="album-art">
            <div class="album-art-disc" id="album-art-disc">
              <div class="disc-hole"></div>
            </div>
          </div>
        </div>
        <div class="now-playing-info">
          <p class="np-label">NOW PLAYING</p>
          <h2 class="np-title" id="np-title">Select a song</h2>
          <p class="np-artist" id="np-artist">—</p>
          <p class="np-album" id="np-album"></p>
        </div>
      </div>
    </section>

    <!-- Genre tabs + Sort -->
    <section class="controls-bar">
      <div class="genre-tabs" id="genre-tabs">
        <button class="genre-tab active" data-genre="All">All</button>
        <button class="genre-tab" data-genre="Pop">Pop</button>
        <button class="genre-tab" data-genre="Rock">Rock</button>
        <button class="genre-tab" data-genre="Jazz">Jazz</button>
        <button class="genre-tab" data-genre="Hip-Hop">Hip-Hop</button>
        <button class="genre-tab" data-genre="Electronic">Electronic</button>
      </div>
      <div class="sort-wrapper">
        <label for="sort-select">Sort:</label>
        <select id="sort-select" class="sort-select">
          <option value="default">Default</option>
          <option value="title">Title</option>
          <option value="artist">Artist</option>
          <option value="duration">Duration</option>
        </select>
      </div>
    </section>

    <!-- Library grid -->
    <section class="library" id="library">
      <!-- Cards rendered by JS -->
    </section>

    <!-- No results -->
    <div class="no-results" id="no-results">
      <span class="no-results-icon">🔇</span>
      <p>No results found</p>
      <span class="no-results-hint">Try a different search term</span>
    </div>

  </main>

  <!-- ===== BOTTOM PLAYER BAR ===== -->
  <footer class="player-bar" id="player-bar">
    <div class="player-track-info">
      <div class="player-mini-art" id="player-mini-art"></div>
      <div class="player-track-text">
        <span class="player-track-title" id="player-track-title">No track selected</span>
        <span class="player-track-artist" id="player-track-artist"></span>
      </div>
    </div>

    <div class="player-controls">
      <button class="ctrl-btn" id="btn-shuffle" title="Shuffle">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-prev" title="Previous">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn play-btn" id="btn-play" title="Play">
        <svg class="icon-play" viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg class="icon-pause" viewBox="0 0 24 24" width="28" height="28" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-next" title="Next">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-repeat" title="Repeat">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        <span class="repeat-badge" id="repeat-badge"></span>
      </button>
    </div>

    <div class="player-progress-row">
      <span class="time-current" id="time-current">0:00</span>
      <input type="range" class="progress-bar" id="progress-bar" min="0" max="100" value="0" step="0.1" />
      <span class="time-total" id="time-total">0:00</span>
    </div>

    <div class="player-volume">
      <button class="ctrl-btn" id="btn-mute" title="Mute (M)">
        <svg class="icon-vol" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        <svg class="icon-muted" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
      </button>
      <input type="range" class="volume-bar" id="volume-bar" min="0" max="100" value="80" />
    </div>
  </footer>

  <!-- Hidden audio element -->
  <audio id="audio-el" preload="auto"></audio>

  <script src="songs.js"></script>
  <script src="app.js"></script>
</body>
</html>

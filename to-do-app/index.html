<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A simple, responsive To-Do List app with Add, Edit, Delete and LocalStorage persistence." />
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== Main Card ===== -->
  <main class="app-card">

    <!-- Header -->
    <header class="app-header">
      <h1>📝 To-Do List</h1>
      <p>Stay organized. Get things done.</p>
    </header>

    <!-- Input Row -->
    <section class="input-section">
      <div class="input-row">
        <input
          type="text"
          id="task-input"
          placeholder="Add a new task…"
          aria-label="New task text"
          autocomplete="off"
        />
        <button class="btn-add" id="btn-add" type="button">+ Add</button>
      </div>
      <span class="validation-msg" id="validation-msg">Task cannot be empty.</span>
    </section>

    <!-- Filter Bar -->
    <nav class="filter-bar" aria-label="Task filters">
      <button class="btn-filter active" data-filter="all">All</button>
      <button class="btn-filter" data-filter="active">Active</button>
      <button class="btn-filter" data-filter="completed">Completed</button>
      <span class="spacer"></span>
      <button class="btn-clear" id="btn-clear">Clear Completed</button>
    </nav>

    <!-- Task List -->
    <ul class="task-list" id="task-list" aria-label="Task list">
      <!-- Tasks are rendered here by script.js -->
    </ul>
  </main>

  <!-- ===== Delete Confirm Modal ===== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <h3>Delete this task?</h3>
      <p>This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn-modal-cancel" id="modal-cancel" type="button">Cancel</button>
        <button class="btn-modal-delete" id="modal-delete" type="button">Delete</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
